apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "danebot.fullname" . }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "patch"]
